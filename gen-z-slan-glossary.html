    // --- Tooltip Setup ---
    let openTrigger = null;
    const tooltip = document.createElement('div');
    tooltip.className = 'custom-tooltip';
    tooltip.innerHTML = '<div class="arrow" aria-hidden="true"></div><div class="tip-content"></div>';
    document.body.appendChild(tooltip);
    const tooltipContent = tooltip.querySelector('.tip-content');
    const tooltipArrow = tooltip.querySelector('.arrow');

    const titleEl = document.getElementById('term-title');
    const definitionEl = document.getElementById('definition-box');
    const insightEl = document.getElementById('insight-box');
    const tagsContainerEl = document.getElementById('tags-container');
    const emojiEquationEl = document.getElementById('emoji-equation');
    const exampleEl = document.getElementById('example-box');
    const navCountEl = document.getElementById('nav-count');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const tabGlobal = document.getElementById('tab-global');
    const tabSA = document.getElementById('tab-sa');
    const tabFE = document.getElementById('tab-fe');
    const tabAF = document.getElementById('tab-af');

    function renderCard(index) {
        const term = slangTerms[index];
        
        titleEl.textContent = term.title;
        definitionEl.textContent = term.definition;
        
        emojiEquationEl.textContent = term.emojiEquation.equation;
        
        insightEl.textContent = term.expertInsight;
        
        tagsContainerEl.innerHTML = term.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        
        updateExample();
        updateNavButtons(index);
    }

    function updateExample() {
        const term = slangTerms[currentIndex];
        const tabs = [tabGlobal, tabSA, tabFE, tabAF];
        tabs.forEach(tab => tab.classList.remove('active'));

        if (currentTab === 'global') {
            exampleEl.textContent = term.globalExample;
            tabGlobal.classList.add('active');
        } else if (currentTab === 'sa') {
            exampleEl.textContent = term.southAsianExample;
            tabSA.classList.add('active');
        } else if (currentTab === 'fe') {
            exampleEl.textContent = term.farEastExample;
            tabFE.classList.add('active');
        } else if (currentTab === 'af') {
            exampleEl.textContent = term.africaExample;
            tabAF.classList.add('active');
        }
    }

    function updateNavButtons(index) {
        navCountEl.textContent = `${index + 1} of ${slangTerms.length}`;
        prevBtn.classList.toggle('disabled', index === 0);
        nextBtn.classList.toggle('disabled', index === slangTerms.length - 1);
    }
    
    // --- Tooltip Helper Functions ---
    function clamp(n, min, max){ return Math.max(min, Math.min(n, max)); }

    function positionTipFor(btn){
        const rect = btn.getBoundingClientRect();
        const vw = window.innerWidth, vh = window.innerHeight;
        const pad = 8;
        tooltip.style.maxWidth = Math.min(vw - pad*2, 420) + 'px';
        const tipRect = tooltip.getBoundingClientRect();
        const preferTop = rect.top > (vh - rect.bottom);
        const top = preferTop ? rect.top - tipRect.height - 12 : rect.bottom + 12;
        const left = clamp(rect.left + rect.width/2 - tipRect.width/2, pad, vw - tipRect.width - pad);
        tooltip.style.top = Math.max(8, top) + 'px';
        tooltip.style.left = left + 'px';
        tooltipArrow.style.top = preferTop ? (tipRect.height - 6) + 'px' : '-6px';
        tooltipArrow.style.left = clamp(rect.left + rect.width/2 - left - 6, 10, tipRect.width - 22) + 'px';
    }

    function openTip(btn, text){
        tooltipContent.textContent = text;
        tooltip.classList.add('show');
        positionTipFor(btn);
        openTrigger = btn;
    }

    function closeTip(){
        tooltip.classList.remove('show');
        openTrigger = null;
    }

    // --- Event Listeners ---
    tabGlobal.addEventListener('click', () => {
        currentTab = 'global';
        updateExample();
    });

    tabSA.addEventListener('click', () => {
        currentTab = 'sa';
        updateExample();
    });

    tabFE.addEventListener('click', () => {
        currentTab = 'fe';
        updateExample();
    });

    tabAF.addEventListener('click', () => {
        currentTab = 'af';
        updateExample();
    });

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard(currentIndex);
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex < slangTerms.length - 1) {
        currentIndex++;
        renderCard(currentIndex);
      }
    });

    // Tooltip listeners
    emojiEquationEl.addEventListener('click', () => {
        const currentTerm = slangTerms[currentIndex];
        if (openTrigger === emojiEquationEl) {
            closeTip();
        } else {
            openTip(emojiEquationEl, currentTerm.emojiEquation.explanation);
        }
    });

    window.addEventListener('resize', () => { if(openTrigger) positionTipFor(openTrigger); });
    window.addEventListener('scroll', () => { if(openTrigger) positionTipFor(openTrigger); }, { passive: true });
    document.addEventListener('click', (e) => {
        if (openTrigger && !openTrigger.contains(e.target) && !tooltip.contains(e.target)) {
            closeTip();
        }
    });

    window.onload = () => renderCard(currentIndex);

  </script>
</body>
</html>
