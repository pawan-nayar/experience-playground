<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BODMAS Learn Component (Full Experience)</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= Base / Theme (Aligned with CBSE Framework) ================= */
        :root {
            /* Core palette */
            --text: #212529;
            --bg: #fff;
            --muted: #f8f9fa;
            --border: #e9ecef;
            
            /* Accent colors */
            --accent: #fd7e14;
            --accent-2: #e87312;
            
            /* Header */
            --header-bg: #212529;
            --header-fg: #f8f9fa;
            
            /* Feedback colors */
            --ok: #16a34a;
            --ok-soft: #dcfce7;
            --bad: #dc2626;
            --bad-soft: #fee2e2;
            
            /* Legacy mappings for compatibility */
            --bd-dark-brown: #212529;
            --bd-orange: #fd7e14;
            --bd-cream: #fff7ed;
            --bd-blue: #3b82f6;
            --primary: var(--accent);
            --primary-foreground: #ffffff;
            --correct: var(--ok);
            --incorrect: var(--bad);
            --correct-light: var(--ok-soft);
            --incorrect-light: var(--bad-soft);
            
            /* Spacing & Radius */
            --radius: 12px;
            --radius-sm: 10px;
            --radius-pill: 999px;
            
            /* Shadows */
            --shadow-soft: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-elegant: 0 10px 20px rgba(253, 126, 20, 0.15);
            
            /* Touch targets */
            --touch-min: 44px;
        }

        /* ================= Reset & Base ================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--muted);
            color: var(--text);
            line-height: 1.7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for mobile */
            padding: 16px;
            padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
        }

        /* ================= Welcome Card ================= */
        .welcome-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: clamp(1.25rem, 4vw, 2rem);
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
            margin: 2rem 0; /* Desktop top/bottom margin */
        }

        .welcome-icon {
            font-size: clamp(2.5rem, 8vw, 3.2rem);
            margin-bottom: 0.25rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .welcome-title {
            font-size: clamp(1.35rem, 4.5vw, 1.75rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.35rem;
            line-height: 1.2;
        }

        .welcome-subtitle {
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            color: #6c757d;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .bodmas-visual {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .bodmas-letter {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, var(--bd-cream), #fff);
            border: 2px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.5rem;
            min-width: 44px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .bodmas-letter:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(253, 126, 20, 0.2);
        }

        .bodmas-letter .letter {
            font-size: clamp(1rem, 2.8vw, 1.25rem);
            font-weight: 700;
            color: var(--accent);
        }

        .bodmas-letter .meaning {
            font-size: clamp(0.55rem, 1.6vw, 0.65rem);
            color: #6c757d;
            font-weight: 500;
            white-space: nowrap;
        }

        .welcome-features {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: clamp(0.8rem, 2.2vw, 0.88rem);
            color: var(--text);
        }

        .feature-item .feature-icon {
            font-size: 1rem;
        }

        .feature-item strong {
            color: var(--accent);
        }

        /* ================= Launch Button ================= */
        .launch-button {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: var(--primary-foreground);
            border: none;
            padding: 0.85rem 1.75rem;
            font-size: clamp(0.95rem, 2.8vw, 1.1rem);
            font-weight: 700;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(253, 126, 20, 0.3);
            min-height: var(--touch-min);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }

        .launch-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(253, 126, 20, 0.4);
        }

        .launch-button:active {
            transform: scale(0.97);
        }

        .launch-button .btn-icon {
            font-size: 1.1rem;
        }

        .welcome-footer {
            margin-top: 0.875rem;
            font-size: clamp(0.7rem, 1.8vw, 0.78rem);
            color: #adb5bd;
        }

        .welcome-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Responsive adjustments for welcome card */
        @media (max-width: 480px) {
            .welcome-card {
                padding: 1rem;
                margin: 1rem 0;
            }

            .bodmas-letter {
                padding: 0.35rem 0.45rem;
                min-width: 40px;
            }

            .welcome-features {
                gap: 0.875rem;
            }

            .welcome-subtitle {
                margin-bottom: 0.75rem;
            }
        }

        /* ================= Modal Overlay ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        /* ================= Modal ================= */
        .modal {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 1.25rem;
            max-width: 580px;
            width: 100%;
            box-shadow: var(--shadow-elegant);
            max-height: calc(100vh - 32px);
            max-height: calc(100dvh - 32px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            flex-shrink: 0;
            gap: 0.5rem;
        }

        .modal-header h2 { 
            margin: 0; 
            color: var(--header-bg); 
            font-size: clamp(1.1rem, 4vw, 1.25rem);
            font-weight: 700;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s ease, transform 0.2s ease;
            min-width: var(--touch-min);
            min-height: var(--touch-min);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-left: auto;
        }

        .audio-toggle-btn,
        .hear-again-btn {
            background: var(--muted);
            border: 1px solid var(--border);
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s ease;
            min-width: var(--touch-min);
            min-height: var(--touch-min);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }

        .audio-toggle-btn.active { 
            color: var(--accent);
            background: var(--bd-cream);
            border-color: var(--accent);
        }

        /* ================= Audio Toast Notification ================= */
        /* Toast is positioned in the overlay, outside the modal */
        .audio-toast {
            position: fixed;
            z-index: 1100;
            background: linear-gradient(135deg, var(--header-bg), #2d3748);
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: min(90vw, 320px);
            width: max-content;
            pointer-events: none;
            transform: translateY(10px);
        }

        .audio-toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Arrow pointing down to the audio button */
        .audio-toast::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: var(--arrow-right, 25px);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--header-bg);
        }

        .audio-toast-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .audio-toast-content {
            flex: 1;
            min-width: 0;
        }

        .audio-toast-title {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.15rem;
            color: var(--accent);
        }

        .audio-toast-text {
            font-size: 0.78rem;
            line-height: 1.4;
            opacity: 0.9;
        }

        .audio-toast-dismiss {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s ease;
            line-height: 1;
        }

        .audio-toast-dismiss:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Toast positioning adjustments for mobile */
        @media (max-width: 600px) {
            .audio-toast {
                padding: 0.6rem 0.8rem;
                max-width: min(85vw, 280px);
            }

            .audio-toast::after {
                right: 15px;
            }

            .audio-toast-icon {
                font-size: 1.2rem;
            }

            .audio-toast-title {
                font-size: 0.8rem;
            }

            .audio-toast-text {
                font-size: 0.72rem;
            }
        }

        .modal-header {
            position: relative;
        }

        .header-controls {
            position: relative;
        }

        .modal-body {
            overflow-y: auto;
            overflow-x: hidden;
            flex-grow: 1;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* Scrollbar styling */
        .modal-body::-webkit-scrollbar { width: 8px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 8px; }
        .modal-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 8px; }
        .modal-body { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) rgba(0,0,0,0.05); }

        /* ================= Action Button ================= */
        .action-button {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            margin-top: 1rem;
            border: none;
            color: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: var(--touch-min);
        }

        .action-button:hover {
            box-shadow: 0 4px 15px rgba(253, 126, 20, 0.3);
        }

        .action-button:active {
            transform: scale(0.98);
        }

        /* ================= Intro Screen ================= */
        .intro-text p {
            line-height: 1.7;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            margin-bottom: 0.75rem;
        }

        .bodmas-explanation {
            background: linear-gradient(135deg, var(--bd-cream), #fff);
            border-left: 4px solid var(--accent);
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin: 1rem 0;
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
        }

        .bodmas-explanation strong { 
            color: var(--accent-2);
            font-weight: 700;
        }

        /* ================= Learn Component ================= */
        .learn-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .equation-counter {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            font-weight: 600;
            color: var(--text);
            background-color: var(--muted);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
        }

        .nav-btn {
            background: var(--accent);
            color: var(--primary-foreground);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            font-weight: 600;
            transition: all 0.2s ease;
            min-height: var(--touch-min);
            min-width: 80px;
        }

        .nav-btn:hover {
            background: var(--accent-2);
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        .nav-btn:disabled { 
            background: #ced4da;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .equation-display {
            background: var(--header-bg);
            color: var(--header-fg);
            padding: clamp(0.75rem, 3vw, 1rem);
            text-align: center;
            font-size: clamp(1.25rem, 5vw, 1.75rem);
            font-family: 'Courier New', Courier, monospace;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-weight: bold;
            transition: all 0.4s ease-in-out;
        }
        
        .thought-process {
            background: linear-gradient(135deg, var(--bd-cream), #fff);
            border-left: 4px solid var(--bd-blue);
            padding: 0.875rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            min-height: 80px;
        }

        .thought-process h3 {
            margin: 0 0 0.5rem 0;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            color: var(--header-bg);
            font-weight: 700;
        }

        .thought-process p {
            margin: 0 0 0.35rem 0;
            font-size: clamp(0.85rem, 2.5vw, 0.9rem);
            line-height: 1.6;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s ease forwards;
        }
        
        /* ================= Solution Area ================= */
        .solution-area {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.875rem;
            background: var(--bg);
        }

        .solution-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 0.6rem 0.5rem;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            font-weight: 600;
            background-color: transparent;
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: var(--touch-min);
        }

        .tab-btn:active {
            transform: scale(0.97);
        }

        .tab-btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background-color: var(--bd-cream);
        }
        
        .solution-step {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            padding: 0.6rem;
            border-radius: var(--radius-sm);
            background-color: var(--muted);
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .solution-step .step-icon {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .solution-step .step-icon.correct { background-color: var(--ok); }
        .solution-step .step-icon.incorrect { background-color: var(--bad); }

        .solution-step .step-explanation {
            font-size: clamp(0.75rem, 2vw, 0.8rem);
            font-family: 'Inter', sans-serif;
            font-style: italic;
            color: #6c757d;
            margin-top: 0.25rem;
        }

        .final-answer {
            text-align: center;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: bold;
            margin-top: 0.75rem;
            padding: 0.6rem;
            border-radius: var(--radius-sm);
        }

        .final-answer.correct { 
            color: var(--ok);
            background-color: var(--ok-soft);
        }

        .final-answer.incorrect { 
            color: var(--bad);
            background-color: var(--bad-soft);
        }

        /* ================= Quiz Styles ================= */
        #quizProgressContainer { 
            width: 100%;
            background-color: var(--border);
            border-radius: var(--radius-pill);
            height: 8px;
            margin: 0.5rem 0 0.75rem 0;
            overflow: hidden;
        }

        #quizProgressBar { 
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: var(--radius-pill);
            transition: width 0.3s ease-in-out;
        }

        #quizProgressText {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: #6c757d;
            text-align: center;
            margin-bottom: 0.75rem;
        }

        #quizQuestionText { 
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 0.5rem;
            background: var(--muted);
            border-radius: var(--radius-sm);
        }

        #quizOptionsContainer { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .quiz-option { 
            padding: 0.875rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-size: clamp(1rem, 3vw, 1.15rem);
            font-weight: 600;
            min-height: var(--touch-min);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .quiz-option:active {
            transform: scale(0.97);
        }

        .quiz-option.correct { 
            border-color: var(--ok);
            background-color: var(--ok-soft);
            color: var(--ok);
            font-weight: 700;
        }

        .quiz-option.incorrect { 
            border-color: var(--bad);
            background-color: var(--bad-soft);
            color: var(--bad);
        }

        .quiz-option.disabled { 
            pointer-events: none;
            opacity: 0.85;
        }

        #quizExplanationBox { 
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--radius);
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            line-height: 1.6;
            border-left: 4px solid;
            display: none;
            animation: fadeInUp 0.5s;
        }

        #quizExplanationBox.correct { 
            background-color: var(--ok-soft);
            border-color: var(--ok);
        }

        #quizExplanationBox.incorrect { 
            background-color: var(--bad-soft);
            border-color: var(--bad);
        }

        #quizExplanationBox strong { 
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
        }
        
        /* ================= Quiz Results ================= */
        #quizResultsScreen h3 { 
            font-size: clamp(1.25rem, 4vw, 1.5rem);
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        #quizScoreText { 
            font-size: clamp(1rem, 3vw, 1.15rem);
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        #quizSummaryContainer { 
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);

        function positionAudioToast() {
            const toast = document.getElementById('audioToast');
            const audioBtn = modal.querySelector('.audio-toggle-btn');
            if (!toast || !audioBtn) return;
            
            const btnRect = audioBtn.getBoundingClientRect();
            const toastWidth = toast.offsetWidth;
            const toastHeight = toast.offsetHeight;
            
            // Position toast above the audio button, arrow pointing to button center
            const topPosition = btnRect.top - toastHeight - 14;
            
            // Calculate position so arrow points to button center
            const btnCenterX = btnRect.left + (btnRect.width / 2);
            const arrowOffset = 30; // Distance from right edge of toast to arrow center
            const rightPosition = window.innerWidth - btnCenterX - arrowOffset;
            
            // Ensure toast doesn't go off screen
            const maxRight = window.innerWidth - toastWidth - 10;
            const finalRight = Math.min(Math.max(10, rightPosition), maxRight);
            
            toast.style.top = Math.max(10, topPosition) + 'px';
            toast.style.right = finalRight + 'px';
            toast.style.left = 'auto';
            
            // Calculate arrow position to point at button center
            const toastRight = window.innerWidth - finalRight - toastWidth;
            const arrowRight = btnCenterX - toastRight - 10;
            toast.style.setProperty('--arrow-right', Math.max(15, Math.min(arrowRight, toastWidth - 25)) + 'px');
        }

        // --- CORE APP LOGIC ---

        function renderThoughtProcess(equationData) {
            const stepsEl = modal.querySelector('#thoughtProcessSteps');
            stepsEl.innerHTML = '';
            const narration = narrationData[equationData.expression]?.thoughtProcess || [];
            const total = equationData.thoughtProcess.length;
            
            function formatSequencedStep(raw, idx) {
                if (/^(Scan:|Plan:)/i.test(raw)) return raw;
                let cleaned = String(raw).replace(/^\s*(First|Then|Next|Finally|Lastly)\s*[:,]?\s*/i, '');
                if (idx === 0) return `First, ${cleaned}`;
                if (idx === total - 1) return `Finally, ${cleaned}`;
                return `Next, ${cleaned}`;
            }
            
            let delay = 800;
            equationData.thoughtProcess.forEach((raw, index) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.innerHTML = formatSequencedStep(raw, index);
                    stepsEl.appendChild(p);
                    // Use the conversational narration
                    if (narration[index]) {
                        queueSpeech(narration[index]);
                    }
                }, delay);
                delay += 3000; // More time between steps for kids
            });
        }
        
        function renderSolutionTabs(equationData) {
            const solutions = generateSolutionData(equationData.expression);
            const narration = narrationData[equationData.expression];
            const tabsEl = modal.querySelector('#solutionTabs');
            tabsEl.innerHTML = '';
            
            solutions.forEach((sol) => {
                const tab = document.createElement('button');
                tab.className = 'tab-btn';
                tab.textContent = sol.title;
                tab.onclick = () => {
                    tabsEl.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    stopSpeech(true);
                    renderSolution(sol, equationData.expression);
                    
                    // Use conversational narration from narrationData
                    if (narration && narration[sol.title]) {
                        queueSpeech(narration[sol.title]);
                    }

                tabsEl.appendChild(tab);

            contentEl.innerHTML = '<div style="padding:0.75rem; color:#6c757d; text-align:center; font-size:0.9rem;">👆 Select one of the buttons above to explore the solution.</div>';
        }

        function renderSolution(solution, expression) {
            const contentEl = modal.querySelector('#solutionContent');
            contentEl.innerHTML = '';
            let currentExpression = expression;
            solution.steps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'solution-step';
                stepDiv.style.animationDelay = `${index * 0.3}s`;
                stepDiv.innerHTML = `
                    <div class="step-icon ${solution.isCorrect ? 'correct' : 'incorrect'}">${solution.isCorrect ? '✓' : '✖'}</div>
                    <div>
                        <code>${currentExpression.replace(step.calc, `<strong>${step.calc}</strong>`)}</code>
                        <div class="step-explanation">${step.explanation}</div>
                    </div>`;
                contentEl.appendChild(stepDiv);
                currentExpression = currentExpression.replace(step.calc, step.result);
            });
            const finalResult = solution.steps[solution.steps.length - 1].result;
            contentEl.innerHTML += `<div class="final-answer ${solution.isCorrect ? 'correct' : 'incorrect'}">Final Answer: ${finalResult}</div>`;
        }

        function selectQuizAnswer(selectedIndex) {
            const q = quizData[currentQuizQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            if (isCorrect) quizScore++;
            userQuizAnswers[currentQuizQuestionIndex] = { question: q.question, selected: q.options[selectedIndex], correctAnswer: q.options[q.correct], isCorrect };
            
            const options = modal.querySelectorAll('.quiz-option');
            options.forEach((opt, index) => {
                opt.classList.add('disabled');

                else if (index === selectedIndex) opt.classList.add('incorrect');
            });

            const explanationBox = modal.querySelector('#quizExplanationBox');
            explanationBox.innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
            explanationBox.className = `explanation ${isCorrect ? 'correct' : 'incorrect'}`;
            explanationBox.style.display = 'block';

            // Voice feedback

                stopSpeech(true); // Clear any pending speech

                } else {
                    queueSpeech(getRandomPhrase(quizNarration.incorrect));

        const quizNarration = {

            incorrect: [

        function speakifyExpr(str) {
            if (!str) return '';
            return String(str)
                .replace(/\*/g, ' times ')
                .replace(/\//g, ' divided by ')
                .replace(/\+/g, ' plus ')
                .replace(/-/g, ' minus ')
                .replace(/\(/g, ' open bracket ')
                .replace(/\)/g, ' close bracket ')
                .replace(/(\d+)/g, (match) => {
                    // Add slight pause after numbers for clarity
                    return match + '... ';
                })
                .replace(/\s+/g, ' ')
                .trim();
        }
        
        function speakEquation(expr) {
            // Convert equation to kid-friendly speech
            return speakifyExpr(expr).replace(/\.\.\./g, '');
        }
        
        function toggleAudio(e) {
            isAudioEnabled = !isAudioEnabled;
            e.target.textContent = isAudioEnabled ? '🔊' : '🔇';
            e.target.classList.toggle('active', isAudioEnabled);
            
            // Dismiss the audio toast when audio is enabled
            if (isAudioEnabled) {
                dismissAudioToast();
            }
            
            if (isAudioEnabled) {
                try { if (window.speechSynthesis?.resume) window.speechSynthesis.resume(); } catch {}
                // If currently on intro screen, use conversational narration
                if (modal.querySelector('.intro-text')) {
                    introNarration.forEach(line => queueSpeech(line));
                    playNextInQueue();
                }
            } else {
                try { if (window.speechSynthesis?.pause) window.speechSynthesis.pause(); } catch {}
            }
        }
        
        function stopSpeech(clearQueue=false) {
            try {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
            } catch {}
            isSpeaking = false;
            if (clearQueue) speechQueue = [];
        }
        
        function queueSpeech(text, pause = PAUSE_BETWEEN_SENTENCES) {
            if (!text) return;
            speechQueue.push({ text, pause });
            if (isAudioEnabled && !isSpeaking) {
                playNextInQueue();
            }
        }
        
        function playNextInQueue() {
            if (speechQueue.length === 0) { isSpeaking = false; return; }
            if (!isAudioEnabled) { isSpeaking = false; return; }
            isSpeaking = true;
            
            const item = speechQueue.shift();
            const text = typeof item === 'string' ? item : item.text;
            const pause = typeof item === 'string' ? PAUSE_BETWEEN_SENTENCES : (item.pause || PAUSE_BETWEEN_SENTENCES);
            
            speak(text, () => {
                // Add pause between utterances for better comprehension
                setTimeout(playNextInQueue, pause);
            });
        }
        
        function speak(text, callback) {
            try {
                if (!isAudioEnabled || !window.speechSynthesis) {
                    isSpeaking = false;
                    return;
                }
                // interrupt current utterance only
                try { window.speechSynthesis.cancel(); } catch {}
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = SPEECH_RATE;  // Slow for kids (~80 wpm)
                utterance.pitch = 1.05;        // Slightly warmer tone
                
                utterance.onend = () => { 
                    isSpeaking = false; 
                    if (callback) callback(); 
                };
                utterance.onerror = (e) => { 
                    console.error('Speech error', e); 
                    isSpeaking = false; 
                    if (callback) callback(); 
                };
                
                window.speechSynthesis.speak(utterance);
            } catch (err) {
                console.warn('Speak failed:', err);
                isSpeaking = false;
                if (callback) callback();
            }
        }
        
        // Helper to get random encouraging phrase
        function getRandomPhrase(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        // --- INITIALIZATION ---
        launchModalBtn.addEventListener('click', openModal);

    </script>
</body>
