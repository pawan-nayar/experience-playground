<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Light & Dark: Immersive Anthology</title>
    <style>
        :root {
            /* Light Mode Palette */
            --bg-light-1: #fff1eb;
            --bg-light-2: #ace0f9;
            --text-light: #2d3436;
            --ripple-light: rgba(45, 52, 54, 0.15);
            
            /* Dark Mode Palette */
            --bg-dark-1: #0f0c29;
            --bg-dark-2: #302b63; 
            --bg-dark-3: #24243e;
            --text-dark: #dfe6e9;
            --ripple-dark: rgba(223, 230, 233, 0.2);

            /* Transitions */
            /* A more sophisticated ease for smoother motion */
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Slower background transition for a more premium feel */
            transition: background 2s ease, color 2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, var(--bg-light-1), var(--bg-light-2));
            color: var(--text-light);
            position: relative; /* Needed for ripple positioning */
        }

        body.dark-mode {
            background: linear-gradient(135deg, var(--bg-dark-1), var(--bg-dark-2), var(--bg-dark-3));
            color: var(--text-dark);
        }

        /* --- UI: Toggle Switch --- */
        .header-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 110;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-label {
            font-family: sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            pointer-events: none;
            transition: color 2s ease;
        }

        .switch-checkbox { display: none; }
        .switch-label {
            display: block;
            width: 44px; /* Slightly more compact */
            height: 24px;
            background: rgba(0,0,0,0.05);
            border: 1px solid currentColor;
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
             opacity: 0.8;
        }
        body.dark-mode .switch-label { background: rgba(255,255,255,0.1); }
        
        .switch-label::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: currentColor;
            border-radius: 50%;
            transition: transform 0.4s var(--ease-smooth);
        }
        .switch-checkbox:checked + .switch-label::after {
            transform: translateX(20px);
        }

        /* --- Main Content Animations --- */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 0 6vw;
            text-align: center;
            /* Ensure clicks pass through wrapper to body for ripple */
            pointer-events: none; 
        }

        /* Base state: hidden below, slightly scaled down */
        .quote-text, .quote-author {
            opacity: 0;
            transform: translateY(40px) scale(0.98); 
            transition: opacity 0.8s ease, transform 0.8s var(--ease-smooth);
        }

        .quote-text {
            font-size: clamp(1.6rem, 4vw + 1rem, 3.2rem); 
            font-weight: 300;
            line-height: 1.3;
            margin-bottom: 35px;
        }

        .quote-author {
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            font-style: italic;
            letter-spacing: 1px;
            transition-delay: 0.1s; /* Slight stagger for author */
        }

        /* Active State: Visible and centered */
        .visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Exit State: Floating up and vanishing */
        .exiting {
            opacity: 0 !important;
            transform: translateY(-40px) scale(1.02) !important;
        }


        /* --- Background Graphic --- */
        .planet-graphic {
            position: absolute;
            width: min(75vw, 550px);
            height: min(75vw, 550px);
            border: 1px solid rgba(100,100,100,0.15);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            transition: border-color 2s;
        }
        
        body.dark-mode .planet-graphic {
            border-color: rgba(255,255,255,0.1);
        }

        .orbit-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            margin-top: -5px; margin-left: -5px;
            background: currentColor;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
            /* Using CSS variables for dynamic orbit radius based on screen size */
            --orbit-radius: 37.5vw; 
            /* Initially paused and positioned at 6 o'clock (90deg = bottom) */
            animation: orbit 8.2s linear infinite paused;
            transform: rotate(90deg) translateX(var(--orbit-radius)) rotate(-90deg);
            transition: border-radius 0.3s ease;
        }
        
        .orbit-dot.orbiting {
            /* Start orbit animation when countdown completes */
            animation-play-state: running;
        }

        @media (min-width: 734px) { .orbit-dot { --orbit-radius: 275px; } }

        @keyframes orbit {
            from { transform: rotate(90deg) translateX(var(--orbit-radius)) rotate(-90deg); }
            to   { transform: rotate(450deg) translateX(var(--orbit-radius)) rotate(-450deg); }
        }
        
        /* Diamond transformation - shape changes while orbiting */
        .orbit-dot.diamond {
            /* Orbit animation continues - background becomes transparent, diamond shape in ::before */
            background: transparent;
        }
        
        /* Diamond shape using pseudo-element so orbit transform isn't affected */
        .orbit-dot.diamond::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            transform: translate(-50%, -50%) rotate(45deg);
            animation: diamondShapeTransform 1.2s ease-in-out;
        }
        
        /* Diamond transformation phases: 0.4s grow, 0.4s stable, 0.4s fade */
        @keyframes diamondShapeTransform {
            0% {
                /* Start of grow phase - transform from circle to diamond */
                width: 10px;
                height: 10px;
                opacity: 1;
            }
            33.33% {
                /* End of grow phase (0.4s) - full diamond size */
                width: 18px;
                height: 18px;
                opacity: 1;
            }
            66.66% {
                /* End of stable phase (0.8s total) - maintain diamond */
                width: 18px;
                height: 18px;
                opacity: 1;
            }
            100% {
                /* End of fade phase (1.2s total) - transform back to circle */
                width: 10px;
                height: 10px;
                opacity: 1;
            }
        }
        
        @media (min-width: 734px) {
            @keyframes diamondShapeTransform {
                0% {
                    width: 10px;
                    height: 10px;
                    opacity: 1;
                }
                33.33% {
                    width: 16px;
                    height: 16px;
                    opacity: 1;
                }
                66.66% {
                    width: 16px;
                    height: 16px;
                    opacity: 1;
                }
                100% {
                    width: 10px;
                    height: 10px;
                    opacity: 1;
                }
            }
        }


        /* --- Tap Ripple Feedback --- */
        .click-ripple {
            position: absolute;
            border-radius: 50%;
            /* Default Light Mode Ripple Color */
            background-color: var(--ripple-light);
            transform: scale(0);
            animation: ripple-effect 0.7s ease-out forwards;
            pointer-events: none; /* Ensure it doesn't block interaction */
            z-index: 5; /* Above background, below text */
        }

        body.dark-mode .click-ripple {
             /* Dark Mode Ripple Color */
            background-color: var(--ripple-dark);
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* --- Start Overlay --- */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--bg-light-1), var(--bg-light-2));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease;
            padding: 40px 20px;
        }
        
        .start-content {
            text-align: center;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .start-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--text-light);
        }
        
        .start-description {
            font-size: clamp(1rem, 2vw, 1.3rem);
            line-height: 1.8;
            margin-bottom: 50px;
            color: var(--text-light);
            opacity: 0.85;
            font-weight: 300;
            padding: 0 20px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, rgba(45, 52, 54, 0.1), rgba(45, 52, 54, 0.05));
            color: var(--text-light);
            border: 2px solid currentColor;
            padding: 18px 50px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            font-weight: 400;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(0);
        }
        
        .start-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .start-btn:hover {
            background: rgba(45, 52, 54, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            letter-spacing: 5px;
        }
        
        .start-btn:active {
            transform: translateY(-1px) scale(0.98);
        }
        
        .start-btn.clicked::before {
            width: 300px;
            height: 300px;
        }
        
        .headphones-hint {
            margin-top: 30px; 
            font-size: clamp(0.65rem, 1.5vw, 0.8rem); 
            font-family: sans-serif;
            text-transform: uppercase; 
            letter-spacing: 3px; 
            opacity: 0.6; 
            color: var(--text-light);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }
        
        /* Time Display */
        .time-display {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 100;
            pointer-events: none;
            color: var(--text-light);
            font-weight: 300;
            white-space: nowrap;
            /* Ensure it's always in viewport */
            max-width: calc(100vw - 60px);
        }
        
        .time-display.visible {
            opacity: 0.55;
        }
        
        body.dark-mode .time-display {
            color: var(--text-dark);
        }
        
        @media (max-width: 768px) {
            .time-display {
                bottom: 20px;
                right: 20px;
                font-size: 11px;
                max-width: calc(100vw - 40px);
            }
        }
        
        /* Countdown Display */
        .countdown-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 300;
            color: var(--text-light);
            opacity: 0;
            z-index: 1500;
            pointer-events: none;
            font-family: sans-serif;
            letter-spacing: 2px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .countdown-display.visible {
            opacity: 1;
        }
        
        .countdown-display.fade-out {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
        }
        
        body.dark-mode .countdown-display {
            color: var(--text-dark);
        }
        
        /* Happy Effects - Confetti/Sparkles */
        .celebration-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3000;
            animation: celebrate 1.5s ease-out forwards;
        }
        
        @keyframes celebrate {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg);
            }
        }
        
        .celebration-sparkle {
            position: fixed;
            width: 5px;
            height: 5px;
            background: currentColor;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3000;
            box-shadow: 0 0 15px currentColor, 0 0 25px currentColor;
            animation: sparkle 1.2s ease-out forwards;
        }
        
        @media (min-width: 734px) {
            .celebration-sparkle {
                width: 4px;
                height: 4px;
                box-shadow: 0 0 10px currentColor;
            }
        }
        
        @keyframes sparkle {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: scale(1.5) rotate(180deg);
            }
            50% {
                opacity: 1;
                transform: scale(2) rotate(360deg);
            }
            85% {
                opacity: 0.8;
                transform: scale(1.2) rotate(540deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotate(720deg);
            }
        }

    </style>
</head>

            { q: "The best way to find yourself is to lose yourself in the service of others.", a: "Mahatma Gandhi" },
            { q: "Take up one idea. Make that one idea your life.", a: "Swami Vivekananda" },
            { q: "Where the mind is without fear and the head is held high.", a: "Rabindranath Tagore" },
            { q: "Be still and know that I am God.", a: "Psalm 46:10" },
            { q: "The kingdom of God is within you.", a: "Luke 17:21" },
            { q: "Love your neighbor as yourself.", a: "Leviticus 19:18" },
            { q: "The Tao that can be told is not the eternal Tao.", a: "Tao Te Ching" },
            { q: "You are the light of the world. A city set on a hill cannot be hidden.", a: "Matthew 5:14" },
            { q: "The Self is the friend of him who conquers himself, and the Self is the enemy of him who does not.", a: "Bhagavad Gita" },
            { q: "Peace comes from within. Do not seek it without.", a: "Buddha" },
            { q: "The soul that sees beauty may sometimes walk alone.", a: "Rumi" },
            { q: "God is love, and whoever abides in love abides in God, and God abides in him.", a: "1 John 4:16" }
        ];

        const darkQuotes = [
            { q: "He who fights with monsters should look to it that he himself does not become a monster.", a: "Nietzsche" },
            { q: "I am a forest, and a night of dark trees: but he who is not afraid of my darkness, will find banks full of roses.", a: "Nietzsche" },
            { q: "The world breaks everyone, and afterward, some are strong at the broken places.", a: "Ernest Hemingway" },
            { q: "I think we ought to read only the kind of books that wound and stab us.", a: "Franz Kafka" },
            { q: "My soul is a hidden orchestra; I know not what instruments I sound inside myself.", a: "Fernando Pessoa" },
            { q: "Man is the only creature who refuses to be what he is.", a: "Albert Camus" },
            { q: "We are all merely searching for a way to break out of the prison of our own heads.", a: "Unknown" },
            { q: "Pain is inevitable. Suffering is optional.", a: "Haruki Murakami" },
            { q: "I cannot make you understand. I cannot make anyone understand what is happening inside me.", a: "Franz Kafka" },
            { q: "The darker the night, the brighter the stars.", a: "Dostoevsky" },
            { q: "There is no exquisite beauty… without some strangeness in the proportion.", a: "Edgar Allan Poe" },
            { q: "What is hell? I maintain that it is the suffering of being unable to love.", a: "Dostoevsky" },
            { q: "The loneliness of the wolf is different from the loneliness of the dog.", a: "Gao Xingjian" },
            { q: "I have been bent and broken, but - I hope - into a better shape.", a: "Charles Dickens" },
            { q: "It is a pain to think that we will never be found.", a: "Ocean Vuong" },
            { q: "The abyss you stare into also stares into you.", a: "Nietzsche" },
            { q: "Hell is empty and all the devils are here.", a: "Shakespeare" },
            { q: "We do not see things as they are, we see them as we are.", a: "Anaïs Nin" },
            { q: "The weight of the world is love. Under the burden of solitude.", a: "Allen Ginsberg" },
            { q: "Every man has his secret sorrows which the world knows not.", a: "Longfellow" },
            { q: "Sleep is the only time I feel real.", a: "Unknown" },
            { q: "I felt a funeral, in my brain...", a: "Emily Dickinson" },
            { q: "No tree, it is said, can grow to heaven unless its roots reach down to hell.", a: "Carl Jung" },
            { q: "It is only in the world of objects that we have time and space and selves.", a: "T.S. Eliot" },
            { q: "To live is to suffer, to survive is to find some meaning in the suffering.", a: "Nietzsche" },
            { q: "I became insane, with long intervals of horrible sanity.", a: "Edgar Allan Poe" },
            { q: "We live as we dream—alone.", a: "Joseph Conrad" },
            { q: "Beware; for I am fearless, and therefore powerful.", a: "Mary Shelley" },
            { q: "Time creates all things and destroys all things.", a: "The Gita" },
            { q: "One must still have chaos in oneself to be able to give birth to a dancing star.", a: "Nietzsche" },
            { q: "The silence of these infinite spaces frightens me.", a: "Blaise Pascal" },
            { q: "Death is as sure for that which is born, as birth is for that which is dead.", a: "Bhagavad Gita" },
            { q: "The world is a bridge. Pass over it, but build no house upon it.", a: "Kabir" },
            { q: "In the depth of sorrow, I found myself. In the depth of myself, I found sorrow.", a: "Rabindranath Tagore" },
            { q: "We are what we think. All that we are arises with our thoughts. With our thoughts, we make the world.", a: "Buddha" },
            { q: "The mind is everything. What you think you become, but first you must suffer the becoming.", a: "Buddha" },
            { q: "The greatest enemy of knowledge is not ignorance, it is the illusion of knowledge.", a: "Swami Vivekananda" },
            { q: "The wound is the place where the Light enters you, but first it must break you completely.", a: "Rumi" },
            { q: "All that we are is the result of what we have thought. The mind is everything. What we think we become.", a: "Buddha" },
            { q: "The world breaks everyone, and afterward, some are strong at the broken places. But first, you must break.", a: "Rabindranath Tagore" },
            { q: "The darkest hour is just before the dawn, but the night must be endured.", a: "Swami Vivekananda" },
            { q: "Out of suffering have emerged the strongest souls; the most massive characters are seared with scars.", a: "Rabindranath Tagore" },
            { q: "The cave you fear to enter holds the treasure you seek, but first you must face the darkness within.", a: "Upanishads" },
            { q: "What lies behind us and what lies before us are tiny matters compared to what lies within us, in the shadows.", a: "Swami Vivekananda" },
            { q: "The only way out is through the darkness, through the suffering, through the pain.", a: "Bhagavad Gita" },
            { q: "In the depth of winter, I finally learned that there was in me an invincible summer, but first I had to freeze.", a: "Rabindranath Tagore" },
            { q: "The wound is the place where the Light enters you, but the wound must be deep enough.", a: "Rumi" },
            { q: "The world breaks everyone, and afterward, some are strong at the broken places. But the breaking is necessary.", a: "Mahatma Gandhi" }
        ];

        // --- 2. AUDIO ENGINE ---
        let audioCtx = null;
        let isDarkMode = false;

        const lightScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C Maj
        const darkScale = [196.00, 220.00, 261.63, 293.66, 329.63, 349.23]; // A Min (Lower)

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playString() {
            if (!audioCtx) return;
            const scale = isDarkMode ? darkScale : lightScale;
            const freq = scale[Math.floor(Math.random() * scale.length)];
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc.type = isDarkMode ? 'triangle' : 'sine';
            osc.frequency.value = freq;
            filter.type = "lowpass";
            filter.frequency.value = isDarkMode ? 800 : 2200;

            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(isDarkMode ? 0.2 : 0.15, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3);

            osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 3.1);
        }

        function playSwitchSound(isDark) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = isDark ? 110 : 523.25;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        // --- 3. DOM & ANIMATION LOGIC ---
        const toggle = document.getElementById('mode-toggle');
        const modeLabel = document.getElementById('mode-text');
        const quoteEl = document.getElementById('quote');
        const authorEl = document.getElementById('author');
        const body = document.body;
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const orbitDot = document.querySelector('.orbit-dot');
        const timeDisplay = document.getElementById('time-display');
        const countdownDisplay = document.getElementById('countdown-display');
        
        // Auto-advance timer
        let autoAdvanceTimer = null;
        let diamondTimer = null;
        let isAutoAdvanceActive = false;
        
        // Quote counter
        let quoteCount = 0;
        let timeDisplayTimer = null;
        
        // Track used quotes to avoid repeats
        let usedLightQuotes = [];
        let usedDarkQuotes = [];

        // Format time: single digit 1-9, double 10-12 for hours, double for minutes
        function formatTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Convert to 12-hour format
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            
            // Format: single digit for 1-9, double for 10-12
            const hoursStr = hours.toString();
            // Minutes always double digit
            const minutesStr = minutes.toString().padStart(2, '0');
            
            return `${hoursStr}:${minutesStr} ${ampm}`;
        }

        function showTimeDisplay() {
            if (!timeDisplay) return;
            
            // Clear any existing timer
            if (timeDisplayTimer) {
                clearTimeout(timeDisplayTimer);
            }
            
            // Set time text
            timeDisplay.textContent = formatTime();
            
            // Show time
            timeDisplay.classList.add('visible');
            
            // Hide after 3 seconds
            timeDisplayTimer = setTimeout(() => {
                timeDisplay.classList.remove('visible');
            }, 3000);
        }

        function renderNewQuote() {
            // Increment quote count
            quoteCount++;
            
            // Show time every alternate quote (every 2nd quote = every 16.4 seconds: 2 × 8.2s cycles)
            if (quoteCount % 2 === 0) {
                showTimeDisplay();
            }
            
            // 1. Trigger Exit Animation (float up and out)
            quoteEl.classList.remove('visible');
            authorEl.classList.remove('visible');
            quoteEl.classList.add('exiting');
            authorEl.classList.add('exiting');

            // 2. Wait for exit animation to finish
            setTimeout(() => {
                const source = isDarkMode ? darkQuotes : lightQuotes;
                const usedQuotes = isDarkMode ? usedDarkQuotes : usedLightQuotes;
                
                // If all quotes have been used, reset the used list
                if (usedQuotes.length >= source.length) {
                    usedQuotes.length = 0;
                }
                
                // Get available quotes (not yet used)
                const availableQuotes = source.filter((_, index) => !usedQuotes.includes(index));
                
                // Select a random quote from available ones
                const randomIndex = Math.floor(Math.random() * availableQuotes.length);
                const selectedQuote = availableQuotes[randomIndex];
                
                // Find the original index in the source array
                const originalIndex = source.indexOf(selectedQuote);
                usedQuotes.push(originalIndex);
                
                // Swap Text
                quoteEl.textContent = `"${selectedQuote.q}"`;
                authorEl.textContent = `— ${selectedQuote.a}`;

                // Reset and trigger Entrance Animation (float up from below)
                quoteEl.classList.remove('exiting');
                authorEl.classList.remove('exiting');
                // Force reflow to restart animation
                void quoteEl.offsetWidth; 
                quoteEl.classList.add('visible');
                authorEl.classList.add('visible');
            }, 800); // Match CSS transition duration exactly
        }
        
        // --- AUTO-ADVANCE LOGIC ---
        function createDiamondSparkles() {
            if (!orbitDot) return;
            
            // Don't show sparkles if page is not visible (user alt-tabbed away)
            if (document.hidden) return;
            
            // Use requestAnimationFrame to ensure position is accurate after diamond class is added
            requestAnimationFrame(() => {
                // Get the current position of the dot
                const rect = orbitDot.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Create sparkles around the diamond
                const sparkleCount = 20;
                const colors = isDarkMode 
                    ? ['#dfe6e9', '#ffffff', '#e0e0e0', '#c0c0c0', '#a0a0a0'] 
                    : ['#2d3436', '#636e72', '#b2bec3', '#74b9ff', '#0984e3'];
                
                for (let i = 0; i < sparkleCount; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('celebration-sparkle');
                    
                    const sparkleColor = colors[Math.floor(Math.random() * colors.length)];
                    sparkle.style.color = sparkleColor;
                    sparkle.style.background = sparkleColor;
                    
                    // Position sparkles in a circle around the diamond - closer to diamond
                    const angle = (Math.PI * 2 * i) / sparkleCount + (Math.random() - 0.5) * 0.3;
                    const distance = 20 + Math.random() * 15; // Reduced from 35-60 to 20-35
                    const offsetX = Math.cos(angle) * distance;
                    const offsetY = Math.sin(angle) * distance;
                    
                    sparkle.style.left = `${centerX + offsetX}px`;
                    sparkle.style.top = `${centerY + offsetY}px`;
                    
                    // Stagger the appearance slightly for a more organic feel
                    sparkle.style.animationDelay = `${(i * 15)}ms`;
                    
                    document.body.appendChild(sparkle);
                    
                    // Remove after 1.2 seconds to match diamond duration
                    setTimeout(() => sparkle.remove(), 1200);
                }
            });
        }
        
        function showDiamondIndicator() {
            if (orbitDot) {
                orbitDot.classList.add('diamond');
                // Create sparkles when diamond peaks at 8.2s (0.6s into 1.2s transformation = middle/peak)
                // Diamond starts at 7.6s, peaks at 8.2s, so delay sparkles by 600ms
                setTimeout(() => {
                    createDiamondSparkles();
                }, 600);
                // Remove diamond class after 1.2 seconds (completes at 8.8s: 7.6s + 1.2s = 8.8s)
                setTimeout(() => {
                    hideDiamondIndicator();
                }, 1200);
            }
        }
        
        function hideDiamondIndicator() {
            if (orbitDot) {
                orbitDot.classList.remove('diamond');
            }
        }
        
        function startAutoAdvance() {
            if (!isAutoAdvanceActive) return;
            
            // Clear any existing timers
            clearTimeout(autoAdvanceTimer);
            clearTimeout(diamondTimer);
            hideDiamondIndicator();
            
            // Diamond transformation: starts at 7.6s, peaks at 8.2s (0.6s into 1.2s transformation), completes at 8.8s
            diamondTimer = setTimeout(() => {
                showDiamondIndicator();
            }, 7600);
            
            // Change quote at 8.2 seconds (exactly one revolution, diamond peaks, orbit returns to 6 o'clock)
            // Note: Diamond continues transformation until 8.8s (handled by showDiamondIndicator timeout)
            autoAdvanceTimer = setTimeout(() => {
                playString();
                renderNewQuote();
                // Restart the cycle
                if (isAutoAdvanceActive) {
                    startAutoAdvance();
                }
            }, 8200);
        }
        
        function stopAutoAdvance() {
            isAutoAdvanceActive = false;
            clearTimeout(autoAdvanceTimer);
            clearTimeout(diamondTimer);
            hideDiamondIndicator();
        }
        
        function resetAutoAdvance() {
            stopAutoAdvance();
            isAutoAdvanceActive = true;
            startAutoAdvance();
        }

        // --- 4. RIPPLE VISUAL FEEDBACK ---
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.classList.add('click-ripple');
            // Size of the initial ripple circle
            const size = 60; 
            ripple.style.width = `${size}px`;
            ripple.style.height = `${size}px`;
            ripple.style.left = `${x - size/2}px`;
            ripple.style.top = `${y - size/2}px`;
            
            body.appendChild(ripple);

            // Remove ripple element after animation ends to keep DOM clean
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
        }

        // --- 5. CELEBRATION EFFECTS ---
        function createCelebrationEffects(x, y) {
            // Create confetti particles
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a8e6cf', '#ffd3a5', '#c7ceea'];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('celebration-particle');
                
                // Random color from palette
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.color = color;
                particle.style.background = color;
                
                // Random direction and distance
                const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.5;
                const distance = 150 + Math.random() * 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(particle);
                
                // Remove after animation
                setTimeout(() => particle.remove(), 1500);
            }
            
            // Create sparkles around the button
            const sparkleCount = 15;
            for (let i = 0; i < sparkleCount; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('celebration-sparkle');
                    
                    const sparkleColor = colors[Math.floor(Math.random() * colors.length)];
                    sparkle.style.color = sparkleColor;
                    sparkle.style.background = sparkleColor;
                    
                    const offsetX = (Math.random() - 0.5) * 200;
                    const offsetY = (Math.random() - 0.5) * 200;
                    
                    sparkle.style.left = `${x + offsetX}px`;
                    sparkle.style.top = `${y + offsetY}px`;
                    
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 1000);
                }, i * 30);
            }
        }

        // --- 6. EVENT HANDLERS ---
        
        function startExperience(e) {
            e.preventDefault();
            e.stopPropagation();
            
            // Get button position for celebration effects
            const rect = startBtn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            // Add clicked class for button animation
            startBtn.classList.add('clicked');
            
            // Create celebration effects
            createCelebrationEffects(x, y);
            
            // Play a celebratory sound
            initAudio();
            if (audioCtx) {
                // Play a happy ascending chord
                const scale = [261.63, 329.63, 392.00, 523.25];
                scale.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                        gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                        osc.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.8);
                    }, i * 100);
                });
            }
            
            // Fade out overlay
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.remove();
                // Reset quote count and used quotes when starting
                quoteCount = 0;
                usedLightQuotes = [];
                usedDarkQuotes = [];
                // Start countdown: 3, 2, 1, 0
                startCountdown();
            }, 800);
        }
        
        function startCountdown() {
            if (!countdownDisplay) return;
            
            const numbers = [3, 2, 1, 0];
            let currentIndex = 0;
            
            function showNumber() {
                if (currentIndex >= numbers.length) {
                    // Countdown complete - start the experience
                    countdownDisplay.classList.remove('visible');
                    countdownDisplay.classList.add('fade-out');
                    
                    // Start orbit animation
                    if (orbitDot) {
                        orbitDot.classList.add('orbiting');
                    }
                    
                    // Show first quote and start auto-advance
                    renderNewQuote();
                    isAutoAdvanceActive = true;
                    startAutoAdvance();
                    
                    // Hide countdown after fade
                    setTimeout(() => {
                        countdownDisplay.textContent = '';
                        countdownDisplay.classList.remove('fade-out');
                    }, 300);
                    return;
                }
                
                // Show current number
                countdownDisplay.textContent = numbers[currentIndex];
                countdownDisplay.classList.remove('fade-out');
                countdownDisplay.classList.add('visible');
                
                // Fade out after 0.7 seconds
                setTimeout(() => {
                    countdownDisplay.classList.remove('visible');
                    countdownDisplay.classList.add('fade-out');
                }, 700);
                
                // Move to next number after 1 second
                currentIndex++;
                setTimeout(showNumber, 1000);
            }
            
            // Start countdown
            showNumber();
        }
        startBtn.addEventListener('click', startExperience);
        startBtn.addEventListener('touchstart', startExperience, {passive: false});


        toggle.addEventListener('change', (e) => {
            isDarkMode = toggle.checked;
            if (isDarkMode) {
                body.classList.add('dark-mode');
                modeLabel.textContent = "Dark";
                playSwitchSound(true);
            } else {
                body.classList.remove('dark-mode');
                modeLabel.textContent = "Light";
                playSwitchSound(false);
            }
            renderNewQuote();
            // Reset auto-advance on mode change
            resetAutoAdvance();
        });


        function handleInteraction(e) {
            // Ignore clicks on the toggle UI
            if (e.target.closest('.header-ui')) return;
            
            // Get coordinates for ripple (support touch and mouse)
            let x = e.clientX;
            let y = e.clientY;
            if (e.type === 'touchstart') {
                 x = e.touches[0].clientX;
                 y = e.touches[0].clientY;
            }

            createRipple(x, y);
            playString();
            renderNewQuote();
            // Reset auto-advance on user interaction
            resetAutoAdvance();
        }

        // Use touchstart for immediately responsive feel on mobile
        document.addEventListener('touchstart', handleInteraction, {passive: true});
        // Use click for desktop mouse support
        document.addEventListener('click', (e) => {
             // prevent double firing on devices that fire both touch and click
            if(e.pointerType === 'mouse') handleInteraction(e);
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                // Center ripple for keyboard interaction
                createRipple(window.innerWidth/2, window.innerHeight/2);
                playString();
                renderNewQuote();
                // Reset auto-advance on keyboard interaction
                resetAutoAdvance();
            }
        });

    </script>
</body>
